name: Build and Push to GHCR

on:
  push:
    branches: [main, "rescue/mixed-work-2026-04-09"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/rstaff/cart-agent:latest
            ghcr.io/rstaff/cart-agent:${{ github.sha }}
