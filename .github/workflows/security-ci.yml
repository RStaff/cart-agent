name: security-ci

on:
  push:
    branches:
      - main
      - history-clean
      - develop
      - "**"
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  root-install-and-audit:
    name: Root install + audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm install

      - name: Root audit
        run: npm audit --audit-level=high || true

      - name: Merge marker guard
        run: bash scripts/block-merge-markers.sh

  codeql:
    name: CodeQL
    uses: github/codeql-action/analyze/.github/workflows/codeql.yml@v3
    permissions:
      actions: read
      contents: read
      security-events: write
    with:
      languages: javascript-typescript, python, actions
