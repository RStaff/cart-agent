<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="shopify-api-key" content="__SHOPIFY_API_KEY__" />
  <title>Abando Embedded</title>
  <style>
    :root { --bg:#0b1220; --card:#111b31; --text:#e5e7eb; --muted:#94a3b8; --ok:#16a34a; --err:#dc2626; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
    main { max-width: 860px; margin: 24px auto; padding: 0 16px; }
    .card { background: var(--card); border:1px solid #22314f; border-radius: 12px; padding:16px; margin-top:16px; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    button { border:1px solid #2e3f62; background:#0f1a31; color:var(--text); border-radius:10px; padding:10px 14px; cursor:pointer; }
    pre { white-space:pre-wrap; word-break:break-word; background:#0a1429; border:1px solid #22314f; border-radius:10px; padding:12px; color:#cbd5e1; }
    .ok { color: var(--ok); }
    .err { color: var(--err); }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>Abando Embedded App</h1>
    <p class="muted">This page validates Shopify embedded auth using App Bridge session tokens.</p>

    <div class="card">
      <div class="row">
        <button id="btn-check">Run Auth Check</button>
        <span id="status" class="muted">Idle</span>
      </div>
      <pre id="output">No result yet.</pre>
    </div>
  </main>

  <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const outputEl = document.getElementById('output');
    const btn = document.getElementById('btn-check');

    function setStatus(text, kind) {
      statusEl.textContent = text;
      statusEl.className = kind || 'muted';
    }

    async function getToken() {
      if (!window.shopify || typeof window.shopify.idToken !== 'function') {
        throw new Error('app_bridge_not_available');
      }
      return Promise.race([
        window.shopify.idToken(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('id_token_timeout')), 10000)),
      ]);
    }

    async function checkAuth() {
      try {
        setStatus('Fetching session token…', 'muted');
        const token = await getToken();

        setStatus('Calling protected API…', 'muted');
        const res = await fetch('/api/shopify/context', {
          method: 'GET',
          headers: { Authorization: `Bearer ${token}` },
        });

        const body = await res.json().catch(() => ({}));
        outputEl.textContent = JSON.stringify({ status: res.status, body }, null, 2);

        if (res.ok && body && body.ok) {
          setStatus('Authenticated', 'ok');
        } else {
          setStatus('Auth failed', 'err');
        }
      } catch (err) {
        setStatus('Error', 'err');
        outputEl.textContent = JSON.stringify({
          error: String(err && err.message ? err.message : err),
          hasShopifyGlobal: typeof window.shopify !== 'undefined',
          hasIdTokenFn: Boolean(window.shopify && typeof window.shopify.idToken === 'function'),
          location: window.location.href,
        }, null, 2);
      }
    }

    btn.addEventListener('click', checkAuth);
  </script>
</body>
</html>
