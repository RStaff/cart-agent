query {
  products(first: 10) {
    edges {
      node {
        id
        title
        handle
        status
        vendor
        totalInventory
        featuredMedia {
          ... on MediaImage {
            id
            image {
              url
              altText
            }
          }
        }
        variants(first: 10) {
          edges {
            node {
              id
              title
              price
              availableForSale
            }
          }
        }
      }
    }
  }
}
