<!DOCTYPE html>
<html>
<head>
  <title>Send Console</title>
  <style>
    body { font-family: system-ui; padding: 24px; background: #0b1020; color: #fff; }
    table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    td, th { padding: 10px; border-bottom: 1px solid #333; }
    button { padding: 6px 10px; cursor: pointer; }
  </style>
</head>
<body>

<h1>Send Console</h1>
<p>Real send queue → execution</p>

<table id="table">
<thead>
<tr>
<th>Lead</th>
<th>Message</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
async function load() {
  const res = await fetch("/api/operator/lead-registry");
  const data = await res.json();

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.leads
    .filter(l => l.outreach_ready && !l.sent)
    .forEach(lead => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${lead.name}</td>
        <td>${lead.next_action}</td>
        <td>${lead.sent ? "Sent" : "Ready"}</td>
        <td>
          <button onclick="send('${lead.id}')">Send</button>
        </td>
      `;

      tbody.appendChild(tr);
    });
}

async function send(leadId) {
  await fetch("/api/operator/lead-registry/action", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ leadId, action: "mark_sent" })
  });

  load();
}

load();
</script>

</body>
</html>
